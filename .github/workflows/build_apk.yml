name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Install Android SDK dependencies
      run: |
        yes | sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
        yes | flutter doctor --android-licenses || true
    
    - name: Create necessary directories
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
    
    - name: Prepare Flutter project
      run: |
        # Criar projeto Flutter vazio
        flutter create --platforms=android .
        # Substituir main.dart pelo nosso app
        cat > lib/main.dart << 'EOF'
        import 'package:flutter/material.dart';
        import 'package:flet/flet.dart' as flet;
        
        void main() {
          flet.Flet app = flet.Flet();
          app.entrypoint = 'main';
          app.run();
        }
        EOF
        
        # Atualizar pubspec.yaml com flet
        cat > pubspec.yaml << 'EOF'
        name: apk_quim_plant
        version: 1.0.0
        description: "🌿 Análise Fitoquímica de Plantas"
        environment:
          sdk: '>=3.0.0 <4.0.0'
        dependencies:
          flutter:
            sdk: flutter
          flet: 0.13.0
        flutter:
          uses-material-design: true
          assets:
            - assets/images/
            - assets/icons/
        EOF
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        # Listar APKs
        find . -name "*.apk" -type f
        ls -la build/app/outputs/flutter-apk/ || echo "APK não encontrado"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/app/outputs/flutter-apk/*.apk
        compression-level: 0
        if-no-files-found: warn