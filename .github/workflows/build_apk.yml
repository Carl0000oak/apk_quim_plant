name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Install Android SDK dependencies
      run: |
        yes | sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
        yes | flutter doctor --android-licenses || true
    
    - name: Create necessary directories
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
        cp -r assets/ assets/ 2>/dev/null || true
    
    - name: Prepare Flutter project
      run: |
        # Criar projeto Flutter vazio
        yes | flutter create --platforms=android .
        # Corrigir pubspec.yaml para flet 0.13.0
        cat > pubspec.yaml << 'EOF'
        name: apk_quim_plant
        version: 1.0.0
        description: "🌿 Análise Fitoquímica de Plantas"
        environment:
          sdk: '>=3.0.0 <4.0.0'
        dependencies:
          flutter:
            sdk: flutter
          flet: 0.13.0
          flutter_web_plugins:
            sdk: flutter
        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0
        flutter:
          uses-material-design: true
          assets:
            - assets/images/
            - assets/icons/
        EOF
        # Substituir main.dart
        cat > lib/main.dart << 'EOF'
        import 'package:flutter/material.dart';
        
        void main() {
          runApp(const MyApp());
        }
        
        class MyApp extends StatelessWidget {
          const MyApp({super.key});
        
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'COMPLANT',
              theme: ThemeData(
                primarySwatch: Colors.green,
                useMaterial3: true,
              ),
              home: const Scaffold(
                body: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      Icon(Icons.grass, size: 80, color: Colors.green),
                      SizedBox(height: 20),
                      Text(
                        '🌿 COMPLANT',
                        style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, color: Colors.green),
                      ),
                      SizedBox(height: 10),
                      Text(
                        'Análise Fitoquímica de Plantas',
                        style: TextStyle(fontSize: 16, color: Colors.grey),
                      ),
                    ],
                  ),
                ),
              ),
            );
          }
        }
        EOF
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        ls -la build/app/outputs/flutter-apk/ || echo "APK não encontrado"
        find . -name "*.apk" -type f
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/app/outputs/flutter-apk/*.apk
        compression-level: 0
        if-no-files-found: warn