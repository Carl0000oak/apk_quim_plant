name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Build APK (non-interactive)
      run: |
        # Definir variável para evitar prompts
        export FLET_NO_INTERACTIVE=1
        # Construir com --yes
        flet build apk --yes
      env:
        FLET_NO_INTERACTIVE: 1
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk_quim_plant
        path: build/apk/*.apk