name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
        pip install flet-cli
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Install Android SDK dependencies
      run: |
        yes | sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
    
    - name: Create necessary directories
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
    
    - name: Build APK
      run: |
        # Garantir que flet está instalado
        pip install flet
        # Construir com --include-packages para incluir flet
        yes | flet build apk --verbose --module-name main --include-packages flet,pandas,plotly,rdkit-pypi,requests,beautifulsoup4,lxml
    
    - name: List build output
      run: |
        ls -la build/apk/ || echo "build/apk não encontrado"
        ls -la build/app/outputs/flutter-apk/ || echo "flutter-apk não encontrado"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        compression-level: 0
        if-no-files-found: warn