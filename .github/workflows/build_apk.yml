name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Install Android SDK dependencies
      run: |
        yes | sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
        yes | flutter doctor --android-licenses || true
    
    - name: Create necessary directories
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
    
    - name: Build APK with flet
      run: |
        # Usar flet build com pubspec.yaml simplificado
        yes | flet build apk --module-name main --verbose || echo "Flet build falhou, tentando flutter"
        # Se falhar, usar flutter diretamente com pub get
        if [ ! -d "build/apk" ]; then
          flutter pub get
          flutter build apk --release
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        compression-level: 0
        if-no-files-found: warn