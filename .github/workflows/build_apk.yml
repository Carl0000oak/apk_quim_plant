name: Criar APK Flet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
        cache: true
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Install Android SDK dependencies
      run: |
        yes | sdkmanager "platforms;android-33" "build-tools;33.0.0" || true
        yes | flutter doctor --android-licenses || true
    
    - name: Create necessary directories
      run: |
        mkdir -p assets/images
        mkdir -p assets/icons
        touch assets/images/.gitkeep
        touch assets/icons/.gitkeep
    
    - name: Build APK with Flet CLI
      run: |
        flet build apk --project complant_app.py --product com.carl0000oak.apk_quim_plant
    
    - name: Find APK
      run: |
        echo "Procurando APK..."
        find . -name "*.apk" -type f 2>/dev/null || echo "Nenhum APK encontrado"
        ls -la build/ 2>/dev/null || echo "Diretório build não encontrado"
        ls -la .flet/ 2>/dev/null || echo "Diretório .flet não encontrado"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/*.apk
          .flet/build/*.apk
        compression-level: 0
        if-no-files-found: warn
