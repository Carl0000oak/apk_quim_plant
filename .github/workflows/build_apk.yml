name: Criar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install flet pandas plotly rdkit-pypi requests beautifulsoup4 lxml
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        channel: 'stable'
    
    - name: Enable Flutter desktop
      run: |
        flutter config --enable-linux-desktop
        flutter doctor -v
    
    - name: Build APK (sem interação)
      run: |
        # Definir variável para evitar prompts
        export FLET_NO_INTERACTIVE=1
        export FLUTTER_NO_INTERACTIVE=1
        # Criar um script que responde "y" para tudo
        echo "y" | flet build apk --verbose --module-name main || true
        # Se falhar, tentar com flutter diretamente
        if [ ! -d "build/apk" ]; then
          echo "Tentando build com flutter diretamente..."
          flutter build apk --release
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk_quim_plant
        path: |
          build/apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        compression-level: 0
        if-no-files-found: warn